<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LectureLink — 야마와 KMLE를 AI로 단일화</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap');
    @font-face { font-family:'LINESeedKR'; font-weight:400; src:url('https://cdn.jsdelivr.net/gh/webfontworld/lineseed/LINESeedKR-Rg.woff2') format('woff2'); font-display:swap; }
    @font-face { font-family:'LINESeedKR'; font-weight:700; src:url('https://cdn.jsdelivr.net/gh/webfontworld/lineseed/LINESeedKR-Bd.woff2') format('woff2'); font-display:swap; }
    .ll-root,.ll-root * { font-family:'LINESeedKR','IBM Plex Sans KR','Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,system-ui,sans-serif; letter-spacing:-0.03em; }
    .ll-root h1,.ll-root h2,.ll-root h3 { font-weight:700; letter-spacing:-0.05em; }
    .ui-heavy { font-weight:800; }
    .num-tabular { font-feature-settings:"tnum"; font-weight:800; }
    .terms-scroll::-webkit-scrollbar,.sidebar-scroll::-webkit-scrollbar { width:6px; }
    .terms-scroll::-webkit-scrollbar-track,.sidebar-scroll::-webkit-scrollbar-track { background:transparent; }
    .terms-scroll::-webkit-scrollbar-thumb,.sidebar-scroll::-webkit-scrollbar-thumb { background:#D3D9D4; border-radius:3px; }
    .terms-scroll::-webkit-scrollbar-thumb:hover,.sidebar-scroll::-webkit-scrollbar-thumb:hover { background:#8CBDB3; }
    html { scroll-behavior: smooth; }
    body { margin:0; } #root { width:100%; }
    @keyframes ll-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .ll-pulse { animation:ll-pulse 2s infinite; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    .accordion-content { animation:slideDown 0.4s ease-out forwards; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation:fadeIn 0.3s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const {useState, useEffect} = React;

    /* ── 공통: 인라인 SVG 아이콘 렌더러 ── */
    const Icon = ({name, size=24, strokeWidth=2, className='', style={}}) => {
      const p = {width:size, height:size, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor',
        strokeWidth, strokeLinecap:'round', strokeLinejoin:'round', className, style};
      switch(name) {
        case 'ChevronLeft':   return <svg {...p}><polyline points="15 18 9 12 15 6"/></svg>;
        case 'ChevronRight':  return <svg {...p}><polyline points="9 18 15 12 9 6"/></svg>;
        case 'ArrowRight':    return <svg {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
        case 'BookOpen':      return <svg {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        case 'FileText':      return <svg {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>;
        case 'Search':        return <svg {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        case 'GraduationCap': return <svg {...p}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>;
        case 'Lock':          return <svg {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        case 'User':          return <svg {...p}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        case 'Check':         return <svg {...p}><polyline points="20 6 9 17 4 12"/></svg>;
        case 'X':             return <svg {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        case 'Lightbulb':     return <svg {...p}><line x1="9" y1="18" x2="15" y2="18"/><line x1="10" y1="22" x2="14" y2="22"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14z"/></svg>;
        case 'Sparkles':      return <svg {...p}><path d="M12 3l1.5 5h5l-4 3 1.5 5-4-3-4 3 1.5-5-4-3h5z"/><path d="M5 3l.8 2.5H8L6 7l.8 2.5L5 8.17 3.2 9.5 4 7 2 5.5h2.2z"/><path d="M19 11l.8 2.5H22l-2 1.5.8 2.5-2-1.33-2 1.33.8-2.5-2-1.5h2.2z"/></svg>;
        case 'Brain':         return <svg {...p}><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-1.14z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-1.14z"/></svg>;
        case 'Microscope':    return <svg {...p}><path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14l2-2"/><path d="M7 12l-4-4 4-4 1.5 1.5"/></svg>;
        case 'AlertCircle':   return <svg {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        case 'AlertTriangle': return <svg {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
        case 'Shield':        return <svg {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
        case 'Menu':          return <svg {...p}><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
        case 'Trophy':        return <svg {...p}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>;
        case 'Zap':           return <svg {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
        case 'RotateCcw':     return <svg {...p}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>;
        default:              return null;
      }
    };

    /* ── 브랜드 로고 SVG ── */
    const Logo = ({size=36}) => (
      <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
        <rect x="2" y="2" width="36" height="36" rx="10" fill="#8CBDB3"/>
        <path d="M13 14 Q13 11 16 11 L19 11 Q22 11 22 14 L22 17" stroke="white" strokeWidth="2.2" strokeLinecap="round" fill="none"/>
        <path d="M27 26 Q27 29 24 29 L21 29 Q18 29 18 26 L18 23" stroke="white" strokeWidth="2.2" strokeLinecap="round" fill="none"/>
        <circle cx="20" cy="20" r="2.2" fill="#E67E22"/>
      </svg>
    );

    const UploadIcon = ({size=36}) => (
      <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
        <path d="M32 10V34" stroke="#8CBDB3" strokeWidth="3" strokeLinecap="round"/>
        <path d="M22 20L32 10L42 20" stroke="#8CBDB3" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
        <path d="M12 40V50C12 52.8 14.2 55 17 55H47C49.8 55 52 52.8 52 50V40" stroke="#2F4F4F" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
        <circle cx="48" cy="18" r="3" fill="#E67E22"/>
      </svg>
    );


    /* ════════════════════════════════════════
       VIEWER — QuestionView (공통 서브 컴포넌트)
    ════════════════════════════════════════ */
    function QuestionView({question, selectedAnswer, setSelectedAnswer, graded, isCorrect,
      handleGrade, handleReset, bannerHeader, ctaColor, ctaLabel, resetLabel}) {

      return (
        <div>
          {/* 문제 카드 */}
          <div className="bg-white rounded-3xl border border-gray-100 overflow-hidden mb-4">
            {/* 다크 배너 */}
            <div className="px-6 py-4 flex items-center gap-3 flex-wrap"
              style={{background:'linear-gradient(135deg, #2F4F4F 0%, #3D6363 100%)'}}>
              {bannerHeader}
            </div>

            {/* 문제 본문 */}
            <div className="px-6 md:px-8 py-6">
              <p className="text-sm md:text-[15px] leading-[1.85] mb-5" style={{color:'#2F4F4F', fontWeight:500}}>
                {question.body}
              </p>

              {/* 이미지 (실제 이미지 or 플레이스홀더) */}
              {question.image ? (
                <div className="mb-6 flex justify-center">
                  <img src={question.image} alt="문제 이미지"
                    className="w-full max-w-sm rounded-2xl"
                    style={{objectFit:'contain'}}/>
                </div>
              ) : question.has_image && (
                <div className="mb-6 flex justify-center">
                  <div className="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl border border-dashed"
                    style={{borderColor:'#D3D9D4', backgroundColor:'#FAFBFB'}}>
                    <Icon name="FileText" size={13} style={{color:'#B0B8B4'}}/>
                    <span style={{fontSize:'12px', color:'#9CA3AF', fontWeight:500}}>사진이 복기되지 않았습니다</span>
                  </div>
                </div>
              )}

              {/* 5지선다 */}
              <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                {question.choices.map((c) => {
                  const isSelected = selectedAnswer === c.id;
                  const isAnswer = c.id === question.answer;
                  let bg='#FFFFFF', border='#E5EAE8', textColor='#2F4F4F', numBg='#F5F9F8', numColor='#2F4F4F';
                  if (graded) {
                    if (isAnswer)        { bg='#F0F9F4'; border='#76C7C0'; numBg='#76C7C0'; numColor='#FFFFFF'; }
                    else if (isSelected) { bg='#FDF0EE'; border='#E67E22'; numBg='#E67E22'; numColor='#FFFFFF'; }
                  } else if (isSelected) {
                    bg='#F5F9F8'; border='#8CBDB3'; numBg='#2F4F4F'; numColor='#FFFFFF';
                  }
                  return (
                    <button key={c.id}
                      onClick={() => !graded && setSelectedAnswer(c.id)}
                      disabled={graded}
                      className="w-full flex items-center gap-3 text-left transition"
                      style={{backgroundColor:bg, border:`1.5px solid ${border}`, borderRadius:'16px',
                        padding:'14px', cursor:graded?'default':'pointer'}}>
                      <div className="flex-shrink-0 flex items-center justify-center transition"
                        style={{width:28, height:28, borderRadius:'8px', backgroundColor:numBg,
                          color:numColor, fontSize:'12px', fontFeatureSettings:'"tnum"', fontWeight:800}}>
                        {c.id}
                      </div>
                      <div className="flex-1 flex flex-col gap-2">
                        <span className="text-sm" style={{color:textColor, fontWeight:500}}>{c.text}</span>
                        {question.choiceImages && question.choiceImages[c.id] && (
                          <img src={question.choiceImages[c.id]} alt={`선지${c.id} 이미지`}
                            className="w-full max-w-xs rounded-xl"
                            style={{objectFit:'contain'}}/>
                        )}
                      </div>
                      {graded && isAnswer && <Icon name="Check" size={16} style={{color:'#76C7C0'}} strokeWidth={3}/>}
                      {graded && isSelected && !isAnswer && <Icon name="X" size={16} style={{color:'#E67E22'}} strokeWidth={3}/>}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* 액션 바 */}
            <div className="px-6 md:px-8 py-4 border-t flex items-center justify-between gap-3"
              style={{borderColor:'#F0F0F0', backgroundColor:'#FAFBFB'}}>
              {!graded ? (
                <>
                  <span className="text-xs" style={{color:'#2F4F4F', opacity:0.6, fontWeight:500}}>
                    {selectedAnswer ? `${selectedAnswer}번 선택됨` : '답을 선택해주세요'}
                  </span>
                  <button onClick={handleGrade} disabled={!selectedAnswer}
                    className="flex items-center gap-1.5 transition"
                    style={{backgroundColor:selectedAnswer?ctaColor:'#D3D9D4', color:'#FFFFFF', fontWeight:700,
                      padding:'10px 24px', borderRadius:'9999px', fontSize:'14px',
                      cursor:selectedAnswer?'pointer':'not-allowed', border:'none'}}>
                    {ctaLabel}
                    <Icon name="ArrowRight" size={14}/>
                  </button>
                </>
              ) : (
                <>
                  <div className="flex items-center gap-2">
                    <div className="flex items-center justify-center"
                      style={{width:28, height:28, borderRadius:'50%', backgroundColor:isCorrect?'#76C7C0':'#E67E22'}}>
                      {isCorrect
                        ? <Icon name="Check" size={14} style={{color:'white'}} strokeWidth={3}/>
                        : <Icon name="X" size={14} style={{color:'white'}} strokeWidth={3}/>
                      }
                    </div>
                    <span className="text-sm" style={{color:isCorrect?'#5BA89F':'#E67E22', fontWeight:700}}>
                      {isCorrect ? '정답입니다!' : `오답 — 정답은 ${question.answer}번`}
                    </span>
                  </div>
                  <button onClick={handleReset}
                    className="text-xs transition hover:bg-gray-50"
                    style={{color:'#2F4F4F', border:'1px solid #D3D9D4', fontWeight:700,
                      padding:'8px 20px', borderRadius:'9999px', backgroundColor:'white'}}>
                    {resetLabel}
                  </button>
                </>
              )}
            </div>
          </div>

          {/* 해설 카드 (채점 후 슬라이드 다운) */}
          {graded && (
            <div className="accordion-content bg-white rounded-3xl overflow-hidden"
              style={{border:'2px solid #76C7C0'}}>
              <div className="px-6 md:px-8 py-5 flex items-center gap-2" style={{backgroundColor:'#F0FAF8'}}>
                <div className="flex items-center justify-center"
                  style={{width:32, height:32, borderRadius:'12px', backgroundColor:'#76C7C0'}}>
                  <Icon name="Lightbulb" size={16} style={{color:'white'}}/>
                </div>
                <div>
                  <div className="text-sm" style={{color:'#2F4F4F', fontWeight:700}}>해설</div>
                  <div style={{fontSize:'11px', color:'#2F4F4F', opacity:0.6, fontWeight:500}}>AI가 정리한 핵심 풀이</div>
                </div>
              </div>
              <div className="px-6 md:px-8 py-6">
                <div className="rounded-2xl p-4 mb-4" style={{backgroundColor:'#F5F9F8'}}>
                  <div className="flex items-start gap-2">
                    <Icon name="Sparkles" size={14} style={{color:'#8CBDB3', flexShrink:0, marginTop:'2px'}}/>
                    <p className="text-sm leading-relaxed" style={{color:'#2F4F4F', fontWeight:500}}>
                      {question.explanation.summary}
                    </p>
                  </div>
                </div>
                <div className="text-xs mb-3 inline-flex items-center gap-1.5" style={{color:'#2F4F4F', fontWeight:700}}>
                  <div style={{width:4, height:12, borderRadius:'9999px', backgroundColor:'#E67E22'}}/>
                  핵심 포인트
                </div>
                <ul style={{display:'flex', flexDirection:'column', gap:'10px'}}>
                  {question.explanation.points.map((p, i) => (
                    <li key={i} className="flex items-start gap-2.5 text-sm" style={{color:'#2F4F4F', fontWeight:500}}>
                      <span className="flex-shrink-0 flex items-center justify-center"
                        style={{width:20, height:20, borderRadius:'6px', backgroundColor:'#FEF5EC',
                          color:'#E67E22', fontSize:'10px', fontWeight:800, marginTop:'2px',
                          fontFeatureSettings:'"tnum"', flexShrink:0}}>
                        {i+1}
                      </span>
                      <span className="leading-relaxed">{p}</span>
                    </li>
                  ))}
                </ul>
              </div>
            </div>
          )}
        </div>
      );
    }


    /* ════════════════════════════════════════
       기출 문제 카드 (독립 상태 보유)
    ════════════════════════════════════════ */
    function PastQuestionCard({question}) {
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [graded, setGraded] = useState(false);
      const isCorrect = graded && selectedAnswer === question.answer;
      return (
        <div className="mb-6">
          <QuestionView
            question={question}
            selectedAnswer={selectedAnswer}
            setSelectedAnswer={setSelectedAnswer}
            graded={graded}
            isCorrect={isCorrect}
            handleGrade={() => { if (selectedAnswer !== null) setGraded(true); }}
            handleReset={() => { setSelectedAnswer(null); setGraded(false); }}
            bannerHeader={
              <>
                <span className="px-3 py-1 rounded-full text-xs bg-white num-tabular" style={{color:'#2F4F4F', fontWeight:700}}>
                  {question.year} {question.code}
                </span>
                <span className="text-xs" style={{color:'rgba(255,255,255,0.9)', fontWeight:500}}>
                  [<span style={{color:'#FBC07A', fontWeight:700}}>{question.professor} 교수님</span>] {question.topic}
                </span>
              </>
            }
            ctaColor="#E67E22"
            ctaLabel="채점하기"
            resetLabel="다시 풀기"
          />
        </div>
      );
    }

    /* ─ 강의 ID → 차시 키 매핑 ─ */
    const LECTURE_SESSION = {
      pediatric_basic:'차시1', diffuse_ild:'차시2',   ild_intro:'차시3',
      ild_detail:'차시4',      hp_eosino:'차시5',      pleural_eff:'차시6',
      lung_tumor:['차시7','차시8'], pediatric_std:'차시9',
      pediatric_adv:'차시9',   nontumor:'차시10',       surgical:'차시11',
      critical:'차시12',       ards:'차시13',           lungcancer:'차시14',
      tumor_path:'차시15',     thoracic_surg:'차시16',  mediastinum:'차시17',
      mediastinum_img:'차시18',nuclear_med:'차시19',    radiation:'차시20',
      pulm_rehab:'차시21',     pediatric_img:'차시22',  mech_vent:'차시23',
    };

    /* ─ rawText → 문제 본문 + 선택지 분리 ─
       선지가 한 줄에 "1) A 2) B 3) C 4) D 5) E" 형태로 이어지는 경우와
       각 선지가 별도 줄에 있는 경우 모두 처리 */
    function parseRawText(rawText) {
      if (!rawText) return {body:'', choices:[]};
      const lines = rawText.split('\n');
      const bodyLines = [];
      const choiceLines = [];
      let inChoices = false;
      for (const line of lines) {
        if (!inChoices && /^\s*1\)/.test(line)) inChoices = true;
        if (inChoices) choiceLines.push(line);
        else bodyLines.push(line);
      }
      // 모든 선지 텍스트를 합친 뒤 선지 번호 앞에서 분리 (인라인/멀티라인 모두 대응)
      const choiceText = choiceLines.join(' ');
      const parts = choiceText.split(/(?=\b[1-5]\))/);
      const choiceMap = {};
      for (const part of parts) {
        const m = part.match(/^\s*([1-5])\)\s*(.*)/);
        if (m) choiceMap[parseInt(m[1])] = m[2].trim();
      }
      const choices = [1,2,3,4,5].filter(n => n in choiceMap)
        .map(n => ({id:n, text:choiceMap[n].trim()}));
      return {body: bodyLines.join('\n').trim(), choices};
    }

    /* ─ 이미지 상수 ─ */
    // 연도별 [폴더경로, 확장자] 매핑
    const IMG_DIRS = {
      2020: ['야마 사진/호흡기 야마 사진 2020', '.png'],
      2021: ['야마 사진/호흡기 야마 사진 2021', '.png'],
      2022: ['야마 사진/호흡기 야마 사진 2022', '.png'],
      2023: ['야마 사진/호흡기 야마 사진 2023', '.png'],
      2025: ['야마 사진/호흡기 야마 사진 2025', '.PNG'],
    };
    const Q_IMAGES = new Set([
      // 2025
      '2025-4','2025-5','2025-6','2025-7','2025-8','2025-10',
      '2025-14','2025-15','2025-16','2025-17','2025-18',
      '2025-19','2025-25','2025-27','2025-28','2025-32','2025-37','2025-41',
      // 2023

    /* ─ JSON 문제 → QuestionView 포맷 변환 ─ */
    function transformQ(raw) {
      const {body, choices} = parseRawText(raw.rawText);
      const qKey = `${raw.year}-${raw.num}`;
      const imgEntry = IMG_DIRS[raw.year];
      let image = null;
      if (Q_IMAGES.has(qKey) && imgEntry) {
        image = `${imgEntry[0]}/${qKey}${imgEntry[1]}`;
      }
      const choiceImages = {};
      for (let i = 1; i <= 5; i++) {
        const cKey = `${raw.year}-${raw.num}-선지${i}`;
        if (C_IMAGES.has(cKey) && imgEntry) choiceImages[i] = `${imgEntry[0]}/${cKey}${imgEntry[1]}`;
      }
      return {
        id: raw.id,
        year: raw.year + '년',
        code: 'Q' + raw.num,
        professor: raw.professor,
        topic: (raw.topic||'').replace(/\s+/g,' ').trim(),
        body, choices,
        answer: parseInt(raw.answer),
        explanation: {summary: raw.explanation||'', points:[]},
        has_image: raw.has_image || false,
        image,
        choiceImages,
      };
    }

    function TriviaMockExam({lectureId, onProgress}) {
      const questions = TRIVIA_QUESTIONS[lectureId] || [];
      const [idx, setIdx] = useState(0);
      const [selected, setSelected] = useState(null);
      const [scores, setScores] = useState([]);
      const [done, setDone] = useState(false);

      const total = questions.length;

      const reset = () => { setIdx(0); setSelected(null); setScores([]); setDone(false); };

      if (!total) {
        return (
          <div className="text-center py-16 rounded-3xl border border-dashed" style={{borderColor:'#D3D9D4'}}>
            <div className="flex justify-center mb-3">
              <Icon name="Lock" size={28} style={{color:'#D3D9D4'}}/>
            </div>
            <div className="text-sm" style={{color:'#9CA3AF', fontWeight:500}}>이 차시의 지엽형 문제가 준비 중입니다</div>
            <div style={{fontSize:'11px', color:'#9CA3AF', marginTop:'4px', fontWeight:500}}>베타테스트 이후 추가 예정</div>
          </div>
        );
      }

      /* 완료 화면 */
      if (done) {
        const correct = scores.filter(Boolean).length;
        const msg = correct === total ? '완벽합니다!' : correct >= Math.ceil(total * 0.8) ? '잘 하셨습니다!' : correct >= Math.ceil(total * 0.6) ? '조금만 더 분발하세요!' : '다시 한번 복습해보세요.';
        return (
          <div className="bg-white rounded-3xl border border-gray-100 overflow-hidden">
            <div className="px-6 py-7 flex flex-col items-center text-center gap-3"
              style={{background:'linear-gradient(135deg, #2F4F4F 0%, #3D6363 100%)'}}>
              <div className="flex items-center justify-center"
                style={{width:52, height:52, borderRadius:'18px', backgroundColor:'rgba(255,255,255,0.18)'}}>
                <Icon name="Trophy" size={24} style={{color:'white'}}/>
              </div>
              <div>
                <div className="text-white text-lg" style={{fontWeight:800}}>{total}문제 중 {correct}문제 정답</div>
                <div style={{color:'rgba(255,255,255,0.72)', fontSize:'13px', fontWeight:500, marginTop:'3px'}}>{msg}</div>
              </div>
            </div>
            <div className="px-6 py-6">
              {/* 문항별 결과 */}
              <div className="flex justify-center gap-2 mb-6">
                {scores.map((ok, i) => (
                  <div key={i} className="flex flex-col items-center gap-1">
                    <div className="flex items-center justify-center"
                      style={{width:38, height:38, borderRadius:'12px',
                        backgroundColor:ok?'#F0F9F4':'#FDF0EE',
                        border:`2px solid ${ok?'#76C7C0':'#E67E22'}`}}>
                      {ok
                        ? <Icon name="Check" size={16} style={{color:'#76C7C0'}} strokeWidth={3}/>
                        : <Icon name="X" size={16} style={{color:'#E67E22'}} strokeWidth={3}/>
                      }
                    </div>
                    <span className="text-xs num-tabular" style={{color:'#2F4F4F', opacity:0.5}}>{i+1}</span>
                  </div>
                ))}
              </div>
              {/* 베타 메시지 */}
              <div className="flex justify-center mb-6">
                <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full"
                  style={{backgroundColor:'#F5F9F8', border:'1px solid #E5EAE8'}}>
                  <Icon name="AlertCircle" size={13} style={{color:'#8CBDB3'}}/>
                  <span style={{fontSize:'12px', color:'#2F4F4F', fontWeight:500}}>
                    베타테스트 이후 더 많은 모의고사 문제가 제공됩니다
                  </span>
                </div>
              </div>
              {/* 다시 풀기 */}
              <div className="flex justify-center">
                <button onClick={reset}
                  className="flex items-center gap-2 transition hover:opacity-80"
                  style={{backgroundColor:'#2F4F4F', color:'white', fontWeight:700,
                    padding:'12px 32px', borderRadius:'9999px', fontSize:'14px', border:'none', cursor:'pointer'}}>
                  <Icon name="RotateCcw" size={14}/>
                  다시 풀기
                </button>
              </div>
            </div>
          </div>
        );
      }

      const q = questions[idx];

      const handleSelect = (cid) => {
        if (selected !== null) return;
        setSelected(cid);
        setScores(prev => [...prev, cid === q.answer]);
      };

      const handleNext = () => {
        if (idx + 1 >= total) {
          setDone(true);
          onProgress && onProgress(1);
        } else {
          setIdx(i => i + 1);
          setSelected(null);
        }
      };

      return (
        <div>
          {/* 진행 바 */}
          <div className="flex items-center gap-3 mb-4">

    function shuffle(arr) {
      const a=[...arr];
      for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
      return a;
    }
    function genSet(bank, wrongTypes, usedIds, size) {
      const sorted=[
        ...shuffle(bank.filter(q=>wrongTypes.has(q.type)&&!usedIds.has(q.id))),
        ...shuffle(bank.filter(q=>!wrongTypes.has(q.type)&&!usedIds.has(q.id))),
        ...shuffle(bank.filter(q=>usedIds.has(q.id))),
      ];
      const seen=new Set(), result=[];
      for(const q of sorted){if(!seen.has(q.id)){seen.add(q.id);result.push(q);}if(result.length>=size)break;}
      return shuffle(result);
    }
    function expandYama(raw) {
      const out={};
      for(const[lec,qs]of Object.entries(raw)){
        out[lec]=qs.map(([body,cs,answer,explanation,type],i)=>({
          id:`${lec}-${i}`,type,body,answer,explanation,
          choices:cs.map((text,j)=>({id:j+1,text})),
        }));
      }
      return out;
    }

    function YamaMockExam({lectureId, onProgress}) {
      const bank = YAMA_QUESTIONS[lectureId] || [];
      const SIZE=5, TOTAL=3;
      const mkInit = (b) => {
        const s=genSet(b,new Set(),new Set(),SIZE);
        return {setIdx:0,qs:s,qi:0,sel:null,sAns:[],aAns:[],used:new Set(s.map(q=>q.id)),phase:'q'};
      };
      const [g,setG] = useState(()=>mkInit(bank));
      useEffect(()=>{setG(mkInit(bank));},[lectureId]);

      if(!bank.length) return (
        <div className="text-center py-16 rounded-3xl border border-dashed" style={{borderColor:'#D3D9D4'}}>
          <div style={{display:'flex',justifyContent:'center',marginBottom:8}}><Icon name="Lock" size={28} style={{color:'#D3D9D4'}}/></div>
          <div className="text-sm" style={{color:'#9CA3AF',fontWeight:500}}>이 차시의 야마형 문제가 준비 중입니다</div>
          <div style={{fontSize:'11px',color:'#9CA3AF',marginTop:4,fontWeight:500}}>베타테스트 이후 추가 예정</div>
        </div>
      );

      const {setIdx,qs,qi,sel,sAns,aAns,used,phase}=g;
      const q=qs[qi];

      const onSel=(cid)=>{
        if(sel!==null)return;
        const ok=cid===q.answer;
        setG(p=>({...p,sel:cid,sAns:[...p.sAns,{type:q.type,ok}]}));
      };
      const onNext=()=>{
        if(qi+1>=SIZE){setG(p=>({...p,phase:'setdone'}));onProgress&&onProgress(setIdx+1);}

                        <span style={{fontWeight:700,color:'#E67E22'}}>5년 이하의 징역 또는 5천만 원 이하의 벌금</span>에 처해질 수 있습니다.
                      </div>
                    </div>
                    <div style={{fontWeight:700,marginBottom:'4px'}}>제5조 (운영자의 의무)</div>
                    <ol style={{listStyleType:'decimal',paddingLeft:'20px',marginBottom:'12px'}}>
                      <li style={{marginBottom:'4px'}}>운영자는 기술적 보호 조치를 취하기 위해 노력합니다.</li>
                      <li style={{marginBottom:'4px'}}>저작권자로부터 자료 삭제 요청을 받은 경우 지체 없이 삭제합니다.</li>
                      <li>저작권 관련 문의: <span style={{fontWeight:700}}>sixthmoon_04@naver.com</span></li>
                    </ol>
                    <div style={{fontWeight:700,marginBottom:'4px'}}>제6조 (면책)</div>
                    <ol style={{listStyleType:'decimal',paddingLeft:'20px',marginBottom:'12px'}}>
                      <li style={{marginBottom:'4px'}}>본 서비스는 무료로 제공되며, 운영자는 이용으로 인한 손해에 대해 책임을 지지 않습니다.</li>
                      <li>베타 테스트 기간 중 서비스는 예고 없이 중단될 수 있습니다.</li>
                    </ol>
                    <div style={{fontWeight:700,marginBottom:'4px'}}>제7조 (약관의 변경)</div>
                    <p>본 약관은 베타 테스트 종료 후 정식 서비스 출시 시 전면 개정됩니다.</p>
                  </div>
                </div>
                <label className="flex items-start gap-3 cursor-pointer select-none p-3 rounded-2xl transition hover:bg-gray-50">
                  <div style={{flexShrink:0,marginTop:'2px'}}>
                    <input type="checkbox" checked={agreed} onChange={e=>handleAgree(e.target.checked)} style={{position:'absolute',opacity:0,width:0,height:0}}/>
                    <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${agreed?'#E67E22':'#C9D1CD'}`,backgroundColor:agreed?'#E67E22':'white',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s'}}>
                      {agreed&&<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}
                    </div>
                  </div>
                  <span className="text-xs leading-relaxed" style={{color:'#2F4F4F',fontWeight:500}}>
                    <span style={{color:'#E67E22',fontWeight:700}}>[필수]</span> 위 약관을 모두 읽었으며, 자료 유출 금지 및 이용 조건에 동의합니다
                  </span>
                </label>
                {!agreed && <div className="mt-3 text-center" style={{fontSize:'11px',color:'#9CA3AF',fontWeight:500}}>약관에 동의하시면 시작하기 버튼이 활성화됩니다</div>}
                <div className="mt-4 mb-8">
                  <button onClick={onStart} disabled={!agreed}
                    className="w-full py-4 rounded-full flex items-center justify-center gap-2 transition"
                    style={{backgroundColor:agreed?'#E67E22':'#D3D9D4',color:'white',fontWeight:700,
                      cursor:agreed?'pointer':'not-allowed',border:'none',fontSize:'15px',
                      boxShadow:agreed?'0 4px 20px rgba(230,126,34,0.35)':'none'}}>
                    시작하기 <Icon name="ArrowRight" size={16}/>
                  </button>
                </div>
                <div className="w-full bg-white border-2 border-dashed rounded-3xl p-5 flex items-center gap-4 transition cursor-pointer"
                  style={{borderColor:'#D3D9D4'}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor='#8CBDB3';e.currentTarget.style.backgroundColor='#F5F9F8'}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='#D3D9D4';e.currentTarget.style.backgroundColor='white'}}>
                  <div className="flex-shrink-0 w-14 h-14 rounded-2xl flex items-center justify-center" style={{backgroundColor:'#F5F9F8'}}><UploadIcon size={36}/></div>
                  <div className="flex-1">
                    <div className="text-sm mb-1" style={{color:'#2F4F4F',fontWeight:700}}>내 강의록 업로드하고 분석하기</div>
                    <div className="text-xs" style={{color:'#9CA3AF'}}>[베타테스트 이후 추가 예정]</div>
                  </div>
                  <Icon name="ArrowRight" size={18} style={{color:'#8CBDB3'}}/>
                </div>
                <div className="flex justify-center mt-4 mb-5">
                  <a href="#" className="text-xs hover:opacity-70 transition" style={{color:'#2F4F4F',opacity:0.55,fontWeight:500}}>혹시 없는 강의록인가요? 직접 업로드하기 →</a>
                </div>
              </div>
            </div>
          </section>

          {/* CORE FEATURES */}
          <section id="features" className="py-20" style={{backgroundColor:'#FAFBFB'}}>
            <div className="max-w-7xl mx-auto px-6">
              <div className="text-center mb-16">
                <div className="inline-block px-4 py-1.5 rounded-full mb-4" style={{backgroundColor:'#F5F9F8'}}>
                  <span style={{fontSize:'12px',color:'#8CBDB3',fontWeight:700,letterSpacing:'0.05em'}}>CORE FEATURES</span>
                </div>
                <h2 className="text-3xl md:text-5xl mb-5" style={{color:'#2F4F4F',lineHeight:1.25}}>의대생의 시간을 설계하는<br/><span style={{color:'#E67E22'}}>3가지</span> 엔진</h2>
                <p className="text-lg max-w-2xl mx-auto" style={{color:'#2F4F4F',opacity:0.7,fontWeight:500}}>흩어진 학습 자료를 정밀하게 꿰어 내신과 KMLE를 <span style={{color:'#E67E22',fontWeight:700}}>동시에</span> 잡습니다.</p>
              </div>
              <div className="grid md:grid-cols-3 gap-6">
                {/* 카드 1: 자동 매핑 */}
                <div className="bg-white rounded-3xl p-8 transition hover:shadow-xl hover:-translate-y-1 border border-gray-100">
                  <div className="w-12 h-12 rounded-2xl flex items-center justify-center mb-6" style={{backgroundColor:'#8CBDB3'}}>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                  </div>
                  <h3 className="text-xl mb-3" style={{color:'#2F4F4F',whiteSpace:'pre-line',lineHeight:1.4}}>{'강의록 · 기출 · KMLE\n자동 매핑'}</h3>
                  <p className="text-sm mb-6" style={{color:'#2F4F4F',opacity:0.7,fontWeight:400}}>학교 야마 PDF를 올리면 AI가 관련 기출과 KMLE 문항을 단원별로 연결해 드립니다.</p>
                  <div className="flex items-center gap-2 pt-4 border-t border-gray-100">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8CBDB3" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    <span className="text-xs" style={{color:'#2F4F4F',fontWeight:700}}>단원별 자동 연결</span>
                  </div>
                </div>
                {/* 카드 2: 유사 문제 생성 */}
                <div className="bg-white rounded-3xl p-8 transition hover:shadow-xl hover:-translate-y-1 border border-gray-100">
                  <div className="w-12 h-12 rounded-2xl flex items-center justify-center mb-6" style={{backgroundColor:'#E67E22'}}>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                  </div>
                  <h3 className="text-xl mb-3" style={{color:'#2F4F4F',whiteSpace:'pre-line',lineHeight:1.4}}>{'AI 오답 기반\n유사 문제 생성'}</h3>
                  <p className="text-sm mb-6" style={{color:'#2F4F4F',opacity:0.7,fontWeight:400}}>틀린 문제의 개념을 분석해 같은 약점을 찌르는 변형 문제를 만들어 드립니다.</p>
                  <div className="flex items-center gap-2 pt-4 border-t border-gray-100">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8CBDB3" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    <span className="text-xs" style={{color:'#2F4F4F',fontWeight:700}}>개념 · 증례 · 임상추론</span>
                  </div>
                </div>
                {/* 카드 3: 모의고사 */}
                <div className="bg-white rounded-3xl p-8 transition hover:shadow-xl hover:-translate-y-1 border border-gray-100">
                  <div className="w-12 h-12 rounded-2xl flex items-center justify-center mb-6" style={{backgroundColor:'#2F4F4F'}}>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <circle cx="12" cy="12" r="10"/>
                      <circle cx="12" cy="12" r="6"/>
                      <circle cx="12" cy="12" r="2"/>
                    </svg>
                  </div>
                  <h3 className="text-xl mb-3" style={{color:'#2F4F4F',whiteSpace:'pre-line',lineHeight:1.4}}>{'실전 대비\n최종 모의고사'}</h3>
                  <p className="text-sm mb-6" style={{color:'#2F4F4F',opacity:0.7,fontWeight:400}}>학교 시험 패턴과 KMLE 출제 경향을 반영한 맞춤 모의고사를 제공합니다.</p>
                  <div className="flex items-center gap-2 pt-4 border-t border-gray-100">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8CBDB3" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    <span className="text-xs" style={{color:'#2F4F4F',fontWeight:700}}>실시간 성적 분석 리포트</span>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* FOOTER */}
          <footer className="border-t border-gray-100">
            <div className="max-w-7xl mx-auto px-6 py-10">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div className="flex items-center gap-2.5"><Logo size={32}/>
                  <div>
                    <div style={{color:'#2F4F4F',fontWeight:700}}>LectureLink</div>
                    <div className="text-xs" style={{color:'#2F4F4F',opacity:0.6,fontWeight:500}}>의대생 AI 학습 솔루션</div>
                  </div>
                </div>
                <div className="flex flex-wrap gap-6 text-xs" style={{color:'#2F4F4F',opacity:0.7,fontWeight:500}}>
                  {['서비스 소개','이용약관','개인정보처리방침','문의하기'].map((t,i)=><a key={i} href="#" className="hover:opacity-100">{t}</a>)}
                </div>
              </div>
              <div className="mt-8 pt-6 border-t flex flex-col md:flex-row justify-between gap-2 text-xs" style={{borderColor:'#F0F0F0',color:'#2F4F4F',opacity:0.6,fontWeight:500}}>
                <div>© <span className="num-tabular">2026</span> LectureLink. All rights reserved.</div>
                <div>Made with care for future doctors.</div>
              </div>
            </div>
          </footer>
        </div>
      );
    }


    /* ════════════════════════════════════════
       ROOT — 페이지 라우터
    ════════════════════════════════════════ */
    function App() {
      const [page, setPage] = useState(() =>
        localStorage.getItem('ll_agreed') === '1' ? 'viewer' : 'landing'
      );
      useEffect(() => { window.scrollTo(0, 0); }, [page]);
      if (page === 'viewer') return <Viewer onBack={() => setPage('landing')}/>;
      return <Landing onStart={() => setPage('viewer')}/>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
